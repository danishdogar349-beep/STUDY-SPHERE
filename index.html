<style>

/* ================= BODY ================= */
body{
  font-family:'Segoe UI';
  margin:0;
  background: radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND CANVAS */
#bgCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* ================= TITLE ================= */
h1{
  text-align:center;
  padding:20px;
  font-size:34px;
  letter-spacing:2px;
  text-transform:uppercase;
  background: linear-gradient(90deg,#00f2ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= CONTAINER ================= */
.container{width:92%;margin:auto;}

/* ================= NAVBAR ================= */
.navbar{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.2);
  padding:5px;
}

.navbar button{
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  margin:6px 10px;
  cursor:pointer;
  padding:8px 18px;
  border-radius:30px;
  transition:0.3s;
  font-size:14px;
}

.navbar button:hover{
  background: linear-gradient(45deg,#00f2ff,#ff00c8);
  box-shadow:0 0 15px #00f2ff, 0 0 25px #ff00c8;
  transform:scale(1.1);
}

/* ================= SEMESTER ================= */
.semester{
  display:none;
  margin-top:20px;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* ================= CARD ================= */
.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.2);
  padding:15px;
  margin:12px 0;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px) scale(1.01);
  box-shadow:0 0 20px rgba(0,255,255,0.3);
}

/* ================= LINKS ================= */
.link{
  cursor:pointer;
  margin:6px;
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  background: rgba(255,255,255,0.1);
  transition:0.3s;
}

.link:hover{
  background: linear-gradient(45deg,#00f2ff,#ff00c8);
  box-shadow:0 0 10px #00f2ff;
}

/* ================= RESOURCE ================= */
.resource-box{
  display:none;
  margin-top:10px;
}

.resource-item{
  display:flex;
  justify-content:space-between;
  background: rgba(255,255,255,0.1);
  margin:6px 0;
  padding:8px;
  border-radius:8px;
  transition:0.3s;
}

.resource-item:hover{
  background: rgba(0,255,255,0.2);
}

/* ================= BUTTON ================= */
.btn{
  background: linear-gradient(45deg,#00f2ff,#ff00c8);
  border:none;
  color:white;
  padding:5px 10px;
  border-radius:6px;
  cursor:pointer;
}

.btn:hover{

/* ================= FOOTER ================= */

<div id="a${id}" class="resource-box">

</div>

<div id="f${id}" class="resource-box"><div class="resource-item">Final_past_paper <a href="${links.final}" target="_blank"><button class="btn">Download</button></a></div></div>

</div>`;
}
</script>

<!-- PARTICLE SCRIPT -->
<script>
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: (Math.random()-0.5),
    vy: (Math.random()-0.5),
    size: Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x += p.vx;
    p.y += p.vy;

    if(p.x<0 || p.x>canvas.width) p.vx *= -1;
    if(p.y<0 || p.y>canvas.height) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle="#00f2ff";
    ctx.fill();
  });

  for(let i=0;i<particles.length;i++){
    for(let j=i;j<particles.length;j++){
      let dx = particles[i].x - particles[j].x;
      let dy = particles[i].y - particles[j].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 120){
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle="rgba(0,242,255,0.1)";
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(animate);
}

animate();
</script>
